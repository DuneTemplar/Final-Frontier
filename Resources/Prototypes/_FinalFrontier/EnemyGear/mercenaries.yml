# Tier 1
- type: entity
  id: LoadoutRandomMercT1
  abstract: true
  components:
  - type: EntityTableSpawner
    deleteSpawnerAfterSpawn: false
    table: !type:NestedSelector
      tableId: MercWeaponT1
  - type: EntityTableContainerFill
    containers:
      jumpsuit: !type:NestedSelector
        tableId: MercJumpsuitGeneric
      head: !type:NestedSelector
        tableId: MercHelmetT1
      shoes: !type:NestedSelector
        tableId: MercBootsGeneric
      outerClothing: !type:NestedSelector
        tableId: MercOuterClothingGeneric
      gloves: !type:NestedSelector
        tableId: MercGlovesGeneric
      mask: !type:NestedSelector
        tableId: MercMaskGeneric
      pocket1: !type:NestedSelector
        tableId: MercPocketLootT1
      pocket2: !type:NestedSelector
        tableId: MercPocketLootT1
      belt: !type:NestedSelector
        tableId: MercBeltT1
      back: !type:NestedSelector
        tableId: MercBackT1
        
