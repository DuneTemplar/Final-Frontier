- type: entity
  save: false
  id: FFMobAtmos
  abstract: true
  components:
  - type: Temperature
    heatDamageThreshold: 2000 # Should prevent mobs from taking damage on planets with extreme heat
    coldDamageThreshold: -250 # Should make mobs immune to cold planets
    currentTemperature: 310.15
    coldDamage: #per second, scales with temperature & other constants
      types:
        Cold: 0
    specificHeat: 42
    heatDamage: #per second, scales with temperature & other constants
      types:
        Heat: 0
  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 310.15
    thermalRegulationTemperatureThreshold: 25
  - type: MovedByPressure
  - type: Insulated


- type: entity
  abstract: true
  id: FFMobBossRestrictions
  components:
  - type: NFSalvageMobRestrictions
    addComponentsLeaveGrid:
    - type: TimedDespawn
      lifetime: 15
    - type: PassiveDamage
      allowedStates:
      - Alive
      damage:
        types:
          Cellular: 1
    - type: Pacified
    removeComponentsReturnGrid:
    - type: TimedDespawn
    - type: PassiveDamage
    - type: Pacified

- type: entity
  id: FFMobHumanoidHostileAIComplex
  abstract: true
  components:
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
       task: SimpleHumanoidHostileCompound
    blackboard:
      NavClimb: !type:Bool
        false
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
#      NavSmash: !type:Bool # They use this option too much for my liking, but I'll keep it here as an option
#        true

# Human NPC, uses equipment, immune to vacuum/low pressure
- type: entity
  suffix: AI, Hostile
  abstract: true
  parent:
  - BaseMobHuman
  - FFMobAtmos
  - MobStepTriggerImmune
  - FFMobHumanoidHostileAIComplex
  id: FFMobHumanoidHostileBase
  components:
  - type: Tool
    speedModifier: 3 # 1.5->3 Mono
    qualities:
      - Prying
    hideQualities: true
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 3 # 1.5->3 Mono
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - Humanoid
  - type: NPCRetaliation
    attackMemoryLength: 10
  - type: MobMover
  - type: StandingState
  - type: Temperature
    heatDamageThreshold: 4000 # Should prevent mobs from taking damage on planets with extreme heat
    coldDamageThreshold: -4000 # Should make mobs immune to cold planets
    currentTemperature: 310.15
    coldDamage: #per second, scales with temperature & other constants
      types:
        Cold: 0
    specificHeat: -4000
    heatDamage: #per second, scales with temperature & other constants
      types:
        Heat: 0
  - type: Barotrauma
    hasImmunity: true
    damage:
      types:
        Blunt: 0
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
  - type: Stamina
    critThreshold: 100
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.6
      80: 0.4
  - type: Blindable
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Carriable # Carrying system from nyanotrasen.
  - type: Respirator
    updateInterval: 99999 # Shouldn't run often, if ever.
    suffocationThreshold: -100 # Should never happen.
    damage:
      types: {}
    damageRecovery:
      types: {}

