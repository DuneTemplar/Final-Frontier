# Base
- type: entity
  name: mercenary
  abstract: true
  parent:
  - FFMobHumanoidHostileBase
  id: MobMercenaryBase
  description: A mercenary, merc, soldier of fortune, hired gun, dog of war.
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: NpcFactionMember
    factions:
    - MercenariesExpeditionNF
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.7
      80: 0.5
  - type: Advertise
    pack: mercenaryhumanoidchatter
    minimumWait: 30
    maximumWait: 120
    nextAdvertisementTime: 10
  - type: AutoWakeUp
  - type: MovementSpeedModifier
    baseWalkSpeed : 4.5
    baseSprintSpeed : 4.5

# Variations
## Tier 1
- type: entity
  name: mercenary soldier
  parent:
  - MobMercenaryBase
  - LoadoutRandomMercT1
  id: MobMercenarySoldierT1
  description: Low ranking soldiers armed with a variety of surplus weapons.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 4.5
    baseSprintSpeed : 4.5
    
## Tier 2
- type: entity
  name: mercenary soldier
  parent:
  - MobMercenaryBase
  - LoadoutRandomMercT2
  id: MobMercenarySoldierT2
  description: A bit above the bottom line soldiers, equipped with far better weapons.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 4.5
    baseSprintSpeed : 4.5

## Tier 3
- type: entity
  name: mercenary soldier
  parent:
  - MobMercenaryBase
  - LoadoutRandomMercT3
  id: MobMercenarySoldierT3
  description: Higher ranking mercenary soldiers, often equipped with heavy weapons.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 4.5
    baseSprintSpeed : 4.5
    
## Tier 4 - Boss
- type: entity
  name: mercenary captain
  parent: [ MobMercenaryBase, FFMobBossRestrictions, LoadoutRandomMercCaptain ]
  id: MobMercenaryCaptain
  description: The leaders of these bands of brigands, a mercenary captain is both cruel and lethally effective. Exercise caution.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 4.75
    baseSprintSpeed : 4.75
    # Ghost role stuff
  - type: GhostRole
    allowMovement: true
    name: ghost-role-information-mercenary-captain-dungeon-name
    description: ghost-role-information-mercenary-captain-dungeon-description
    rules: ghost-role-information-dungeon-boss-rules
    raffle:
      settings: default
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: GhostTakeoverAvailable
